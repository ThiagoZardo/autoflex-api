version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: autoflex-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autoflex
      MYSQL_USER: autoflex
      MYSQL_PASSWORD: autoflex
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
  